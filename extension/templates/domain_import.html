{% extends "domain_base.html" %}
{% block domain_content %}
<div class="section">
  <div class="section__header">
    <h1 class="section__title">{{ _('domain_import') }}</h1>
  </div>
  <div class="section__body">
    <blockquote class="note">
      <p>{{ _('从Excel或csv中复制[用户名],[角色],[小组]来添加到域内。如：student1,default,class1') }}</p>
    </blockquote>
    {{ noscript_note.render() }}
    <p name="messages"></p>
    {{ form.form_textarea({
        columns:null,
        label:'用户权限',
        name:'users',
        nospellcheck: true
        }) }}
    <div class="row"><div class="column">
      <button name="preview" class="rounded primary button">{{ _('Preview') }}</button>
      <button name="submit" class="rounded button">{{ _('Submit') }}</button>
    </div></div>
  </div>
</div>
{% endblock %}
